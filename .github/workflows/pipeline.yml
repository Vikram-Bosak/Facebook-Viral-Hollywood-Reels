name: Hollywood Reels Automated Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # Trigger 6 times a day (every 4 hours)
    # UTC Equivalent: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00
    - cron: '0 0,4,8,12,16,20 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: End-to-End Hollywood Pipeline
    runs-on: ubuntu-latest
    # Optional: Prevent concurrent runs of the workflow
    concurrency:
      group: hollywood-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🚀 Step 1 - Run Agent 1 (Downloader)
        id: agent1
        run: |
          echo "Starting Agent 1..."
          python src/agent_1_downloader.py

      - name: 💾 Commit history file (Agent 1)
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase || true
          git add downloaded_history.txt || true
          git commit -m "Update download history" || true
          git push || true

      - name: 🎬 Step 2 - Run Agent 2 (Editor)
        id: agent2
        # Automatically skips if Agent 1 fails
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Starting Agent 2..."
          python src/agent_2_editor.py

      - name: 📤 Step 3 - Run Agent 3 (Uploader)
        id: agent3
        # Automatically skips if Agent 2 fails
        env:
          TELEGRAM_BOT_TOKEN_3: ${{ secrets.TELEGRAM_BOT_TOKEN_3 }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} # Main reporting channel
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          echo "Starting Agent 3..."
          python src/agent_3_uploader.py

      - name: 📊 Step 4 - Run Agent 4 (Reporter)
        if: always()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_3 }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Starting Agent 4..."
          python src/agent_4_reporter.py
