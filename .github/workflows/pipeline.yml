name: Facebook Viral Hollywood Reels

on:
  push:
    branches:
      - main
  schedule:
    # 12 runs/day — 1 video per run = 12 reels/day to avoid rate limits
    # Every 2 hours
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Multi-Video Hollywood Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Prevent concurrent runs — queue instead of cancel
    concurrency:
      group: hollywood-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: 🚀 Run Pipeline (1 video per run)
        id: main_agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NVIDIA_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TIKTOK_AUTH_STATE: ${{ secrets.TIKTOK_AUTH_STATE }}
          TIKTOK_AUTH_STATE_B64: ${{ secrets.TIKTOK_AUTH_STATE_B64 }}
          TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
        run: |
          echo "Starting Pipeline (1 video per run)..."
          python main_agent.py

      - name: 📢 Step 2 - Run Unified Reporter (agent_4_reporter.py)
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python src/agent_4_reporter.py

      - name: 💾 Commit updated files (history)
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloaded_history.txt || true
          git add temp/daily_limits.json || true
          git add -f tiktok_error.png || true
          git commit -m "Update download history and limits (including debug screenshot)" || true
          git pull origin main --rebase --strategy-option=ours || true
          git push origin HEAD:main || true
