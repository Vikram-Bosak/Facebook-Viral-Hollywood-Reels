name: Hollywood Reels Automated Pipeline

on:
  push:
    branches:
      - main
  schedule:
    # 4 runs/day instead of 6 — each run now processes UP TO 5 videos
    # UTC 02:00, 08:00, 14:00, 20:00
    - cron: '0 2,8,14,20 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: Multi-Video Hollywood Pipeline
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Prevent concurrent runs — queue instead of cancel
    concurrency:
      group: hollywood-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium --with-deps
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🚀 Run Multi-Video Pipeline (up to 5 videos per run)
        id: main_agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN_3 }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
          YOUTUBE_TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          echo "Starting Multi-Video Pipeline..."
          python main_agent.py

      - name: 💾 Commit updated files (history)
        if: always()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add downloaded_history.txt || true
          git commit -m "Update download history" || true
          git pull --rebase origin main || true
          git push origin main || true
