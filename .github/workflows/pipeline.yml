name: Hollywood Reels Automated Pipeline

on:
  schedule:
    # Trigger 4 times a day: 8 AM, 2 PM, 8 PM, 2 AM US Eastern Time (ET)
    # UTC Equivalent: 12:00, 18:00, 00:00, 06:00
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    name: End-to-End Hollywood Pipeline
    runs-on: ubuntu-latest
    # Optional: Prevent concurrent runs of the workflow
    concurrency:
      group: hollywood-pipeline
      cancel-in-progress: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: 🚀 Step 1 - Run Agent 1 (Downloader)
        id: agent1
        env:
          TELEGRAM_BOT_TOKEN_1: ${{ secrets.TELEGRAM_BOT_TOKEN_1 }}
          TELEGRAM_QUEUE_1_CHAT_ID: ${{ secrets.TELEGRAM_QUEUE_1_CHAT_ID }}
        run: |
          echo "Starting Agent 1..."
          python src/agent_1_downloader.py

      - name: 💾 Commit history file (Agent 1)
        if: success()
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git pull --rebase || true
          git add downloaded_history.txt || true
          git commit -m "Update download history" || true
          git push || true

      - name: 🎬 Step 2 - Run Agent 2 (Editor)
        id: agent2
        # Automatically skips if Agent 1 fails
        env:
          TELEGRAM_BOT_TOKEN_2: ${{ secrets.TELEGRAM_BOT_TOKEN_2 }}
          TELEGRAM_QUEUE_2_CHAT_ID: ${{ secrets.TELEGRAM_QUEUE_2_CHAT_ID }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          echo "Starting Agent 2..."
          python src/agent_2_editor.py

      - name: 📤 Step 3 - Run Agent 3 (Uploader)
        id: agent3
        # Automatically skips if Agent 2 fails
        env:
          TELEGRAM_BOT_TOKEN_3: ${{ secrets.TELEGRAM_BOT_TOKEN_3 }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }} # Main reporting channel
          FB_ACCESS_TOKEN: ${{ secrets.FB_ACCESS_TOKEN }}
          FB_PAGE_ID: ${{ secrets.FB_PAGE_ID }}
        run: |
          echo "Starting Agent 3..."
          python src/agent_3_uploader.py

      - name: 🚨 Send Failure Notification to Telegram
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN_3: ${{ secrets.TELEGRAM_BOT_TOKEN_3 }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN_3}/sendMessage" \
          -d chat_id="${TELEGRAM_CHAT_ID}" \
          -d text="🚨 *PIPELINE FAILED* 🚨%0A%0AAn error occurred in one of the agents! The workflow has been stopped.%0APlease check GitHub Actions Logs for details." \
          -d parse_mode="Markdown"
